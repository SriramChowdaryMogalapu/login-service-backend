name: Flask PR CI & Review

on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint & Code Suggestions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8 reviewdog

      - name: Run lint with reviewdog
        run: |
          flake8 myapp --format=github | reviewdog -f=flake8 -name="flake8" -reporter=github-pr-review -level=warning

  test:
    name: Run Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Set environment for Flask tests
        run: |
          export FLASK_ENV=test
          export DATABASE_URL="sqlite:///:memory:"

      - name: Run tests with coverage
        run: |
          pytest --cov=myapp --cov-report=term-missing --cov-fail-under=80
